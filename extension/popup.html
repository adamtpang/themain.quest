<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --ink: #241b40;
    --paper: #fff7e6;
    --paper2: #ffeccb;
    --gold: #ffcf4a;
    --red: #ff5d5d;
    --green: #54c244;
    --sky: #9bd9ff;
    --muted: #5f5c52;
  }
  html, body { margin: 0; padding: 0; }
  body { width: 320px; background: var(--sky); color: var(--ink); font-family: ui-monospace, "Courier New", monospace; }
  .wrap { padding: 12px; }
  .card { background: var(--paper); border: 3px solid var(--ink); box-shadow: 4px 4px 0 0 var(--ink); padding: 12px; margin-bottom: 12px; }
  h1 { font-size: 13px; margin: 0; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
  .sub { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.35; }
  .big { font-size: 30px; font-weight: 800; line-height: 1; color: var(--red); }
  .bar { height: 12px; border: 3px solid var(--ink); background: var(--paper2); margin-top: 8px; overflow: hidden; box-shadow: inset 2px 2px 0 0 rgba(36, 27, 64, 0.25); }
  .fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--sky)); }
  .aff { font-size: 11px; font-style: italic; color: var(--muted); margin-top: 8px; line-height: 1.3; }
  .row { display: flex; gap: 6px; margin-top: 10px; }
  .stat { flex: 1; background: var(--paper2); border: 3px solid var(--ink); padding: 6px 4px; text-align: center; }
  .stat .n { font-size: 16px; font-weight: 800; line-height: 1; }
  .stat .l { font-size: 8px; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
  .quest { margin-top: 10px; font-size: 12px; line-height: 1.3; }
  .quest b { font-size: 9px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 2px; }
  .mentor { background: var(--gold); }
  .mentor .kicker { font-size: 9px; text-transform: uppercase; opacity: 0.7; }
  .mentor .name { font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .mentor .tag { font-size: 9px; text-transform: uppercase; color: var(--muted); margin-top: 1px; }
  .mentor .lesson { font-size: 12px; line-height: 1.4; margin-top: 7px; }
  .mentor .move { font-size: 11px; line-height: 1.35; margin-top: 7px; border-top: 2px dashed rgba(36, 27, 64, 0.3); padding-top: 6px; }
  .mentor .move b { font-size: 9px; text-transform: uppercase; }
  .cycle { display: block; width: 100%; background: none; border: none; color: var(--ink); font-family: inherit; font-size: 10px; text-transform: uppercase; cursor: pointer; margin-top: 8px; padding: 0; text-align: right; text-decoration: underline; opacity: 0.75; }
  a.play { display: block; text-align: center; background: var(--red); color: var(--paper); border: 3px solid var(--ink); box-shadow: 3px 3px 0 0 var(--ink); padding: 10px; font-weight: 800; text-transform: uppercase; text-decoration: none; font-size: 13px; }
  a.play:active { transform: translate(3px, 3px); box-shadow: 0 0 0 0 var(--ink); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>❤️ the main quest</h1>
      <div class="sub">days are XP. spend today's well.</div>
      <div style="margin-top: 8px;">
        <span class="big" id="daysLeft">...</span>
        <span style="font-size: 12px; font-weight: 800;">days left</span>
      </div>
      <div class="bar"><div class="fill" id="fill" style="width: 0%"></div></div>
      <div class="sub" id="spent">loading the map</div>
      <div class="row">
        <div class="stat"><div class="n" id="lvl">-</div><div class="l">level</div></div>
        <div class="stat"><div class="n" id="streak">-</div><div class="l">streak</div></div>
        <div class="stat"><div class="n" id="boss">-</div><div class="l">boss hp</div></div>
      </div>
      <div class="quest"><b>today's main quest</b><span id="mainQuest">open the game once to sync your quest here</span></div>
      <div class="aff" id="aff"></div>
    </div>

    <div class="card mentor">
      <div class="kicker">study the greatest lives</div>
      <div class="name" id="mName">...</div>
      <div class="tag" id="mTag"></div>
      <div class="lesson" id="mLesson"></div>
      <div class="move"><b>your move today</b> <span id="mMove"></span></div>
      <button class="cycle" id="nextMentor">next mentor →</button>
    </div>

    <a class="play" href="https://themain.quest" target="_blank" rel="noopener">▶ enter the match</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
